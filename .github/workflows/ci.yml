name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go API Tests ─────────────────────────────────
  go-test:
    name: Go Build, Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-go

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: changenow_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd="pg_isready -U test -d changenow_test"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 56379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=2s
          --health-retries=20

    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:55432/changenow_test?sslmode=disable
      TEST_REDIS_URL: redis://localhost:56379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migrations
        run: |
          for f in migrations/*.sql; do
            echo "applying $f"
            psql "$TEST_DATABASE_URL" -f "$f"
          done

      - name: Download dependencies
        run: go mod download

      - name: Vet (static analysis)
        run: go vet ./...

      - name: Build API
        run: go build -o /dev/null ./cmd/api

      - name: Build Worker
        run: go build -o /dev/null ./cmd/worker

      - name: Test (race)
        run: go test -race ./...

  # ── Python AI Service Tests ──────────────────────
  python-check:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports (syntax validation)
        run: python -c "from app.main import app; print('Import OK')"

  # ── Docker Build Test ────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-test, python-check]

    steps:
      - uses: actions/checkout@v4

      - name: Build Go API image
        run: docker build -t changenow-api ./services/api-go

      - name: Build Python AI image
        run: docker build -t changenow-ai ./services/ai-py

      - name: Verify images exist
        run: |
          docker images changenow-api
          docker images changenow-ai
