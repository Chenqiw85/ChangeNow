name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go API Tests ─────────────────────────────────
  go-build:
    name: Go Build & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-go

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Vet (static analysis)
        run: go vet ./...

      - name: Build API
        run: go build -o /dev/null ./cmd/api

      - name: Build Worker
        run: go build -o /dev/null ./cmd/worker

  # ── Python AI Service Tests ──────────────────────
  python-check:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports (syntax validation)
        run: python -c "from app.main import app; print('Import OK')"

  # ── Docker Build Test ────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-build, python-check]

    steps:
      - uses: actions/checkout@v4

      - name: Build Go API image
        run: docker build -t changenow-api ./services/api-go

      - name: Build Python AI image
        run: docker build -t changenow-ai ./services/ai-py

      - name: Verify images exist
        run: |
          docker images changenow-api
          docker images changenow-ai