services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: changenow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../services/api-go/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d changenow"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-service:
    build:
      context: ../services/ai-py
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../services/ai-py/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ../services/api-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../services/api-go/.env
    environment:
      - DATABASE_URL=postgres://app:app@postgres:5432/changenow?sslmode=disable
      - AI_SERVICE_URL=http://ai-service:8001
      - PORT=8080
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus      
  

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata: